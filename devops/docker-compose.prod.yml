services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:latest
    container_name: portfolify-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-conf:/etc/nginx/conf.d
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
      - nginx-certs:/etc/nginx/certs
    labels:
      - com.github.jrcs.letsencrypt_nginx_proxy_companion.nginx_proxy=true
    networks:
      - proxy

  nginx-proxy-acme:
    image: nginxproxy/acme-companion:latest
    container_name: portfolify-nginx-acme
    restart: unless-stopped
    depends_on:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx-conf:/etc/nginx/conf.d
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
      - nginx-certs:/etc/nginx/certs
      - acme:/etc/acme.sh
    networks:
      - proxy

  backend:
    image: ghcr.io/mersel-io/portfolify-backend:latest
    container_name: portfolify-backend
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
      Jwt__Issuer: ${JWT_ISSUER:-Portfolify}
      Jwt__Audience: ${JWT_AUDIENCE:-PortfolifyUsers}
      Jwt__Key: ${JWT_KEY}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-1440}
      VIRTUAL_HOST: api.portfolify.hwc-bootcamp.mersel.io
      VIRTUAL_PORT: "8080"
      LETSENCRYPT_HOST: api.portfolify.hwc-bootcamp.mersel.io
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - proxy

  frontend:
    image: ghcr.io/mersel-io/portfolify-frontend:latest
    container_name: portfolify-frontend
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: portfolify.hwc-bootcamp.mersel.io
      VIRTUAL_PORT: "3000"
      LETSENCRYPT_HOST: portfolify.hwc-bootcamp.mersel.io
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - proxy

volumes:
  nginx-conf:
  nginx-vhost:
  nginx-html:
  nginx-certs:
  acme:

networks:
  proxy:
    driver: bridge
