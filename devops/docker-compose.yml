services:
  postgres:
    image: postgres:17-alpine
    container_name: portfolify-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: portfolify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolify"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
